services:
  backend:
    build:
      context: ./billshield-backend
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./billshield-backend/.env.prod
    volumes:
      - ./billshield-backend/uploads:/app/uploads
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./billshield
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
