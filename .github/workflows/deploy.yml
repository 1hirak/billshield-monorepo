name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/billshield-monorepo || git clone https://github.com/${{ github.repository }}.git ~/billshield-monorepo
            cd ~/billshield-monorepo
            git pull origin main
            sudo docker compose -f ~/billshield-backend/docker-compose.yml down --remove-orphans 2>/dev/null || true
            sudo docker compose -f ~/billshield-monorepo/docker-compose.yml down --remove-orphans 2>/dev/null || true
            sudo docker compose build --no-cache
            sudo docker compose up -d
            sudo docker image prune -af
