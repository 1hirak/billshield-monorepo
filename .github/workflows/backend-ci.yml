name: Backend CI

on:
  push:
    paths:
      - "billshield-backend/**"
  pull_request:
    paths:
      - "billshield-backend/**"

defaults:
  run:
    working-directory: billshield-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: PYTHONPATH=src pytest
